<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Categorías - Sakila</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header>
      <h1>📚 Gestión de Categorías - Sakila</h1>
    </header>

    <main class="container">
      <!-- Botón crear -->
      <div class="actions">
        <button id="btnCreate" class="btn btn-primary">+ Nueva Categoría</button>
      </div>

      <!-- Spinner de carga -->
      <div id="spinner" class="spinner hidden">
        <div class="spinner-content">
          <div class="spinner-ring"></div>
          <p>Cargando datos...</p>
        </div>
      </div>

      <!-- Tabla de categorías -->
      <table id="categoriesTable" class="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Se rellena con JavaScript -->
        </tbody>
      </table>

      <!-- Paginación -->
      <div class="pagination">
        <button id="btnPrev" class="btn btn-secondary">← Anterior</button>
        <span id="pageInfo">Página 1</span>
        <button id="btnNext" class="btn btn-secondary">Siguiente →</button>
      </div>
    </main>

    <!-- Modal para crear/editar -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">Nueva Categoría</h2>
          <button class="btn-close" id="btnCloseModal">&times;</button>
        </div>
        
        <form id="formCategory">
          <div class="form-group">
            <label for="inputName">Nombre de la categoría:</label>
            <input 
              type="text" 
              id="inputName" 
              placeholder="Ej: Acción, Drama, Comedia..." 
              required
            />
          </div>
          
          <div class="modal-actions">
            <button type="submit" class="btn btn-primary" id="btnSave">Guardar</button>
            <button type="button" class="btn btn-secondary" id="btnCancel">Cancelar</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
