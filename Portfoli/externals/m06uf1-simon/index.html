<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color: white;
            font-family: Arial, sans-serif;
        }

        main {
            height: 750px;
            width: 750px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .simon {
            border-radius: 50%;
            width: 100%;
            height: 100%;
            background-color: black;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .black {
            height: 300px;
            width: 300px;
            border-radius: 50%;
            background-color: black;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .black h2 {
            color: white;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        button {
            border-radius: 10px;
            width: 80px;
            height: 35px;
            padding: 5px;
            background-color: aqua;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: deepskyblue;
        }

        .color {
            width: 300px;
            height: 300px;
            position: absolute;
            z-index: 1;
        }

        .color:hover {
            opacity: 0.9;
        }

        .light.green {
            background-color: #7CFF7C !important;
            box-shadow: 0 0 60px 30px #7CFF7C66;
        }
        .light.red {
            background-color: #FF7C7C !important;
            box-shadow: 0 0 60px 30px #FF7C7C66;
        }
        .light.yellow {
            background-color: #FFFFA0 !important;
            box-shadow: 0 0 60px 30px #FFFFA066;
        }
        .light.blue {
            background-color: #7CB7FF !important;
            box-shadow: 0 0 60px 30px #7CB7FF66;
        }

        .green {
            background-color: green;
            top: 50px;
            left: 50px;
            border-top-left-radius: 100%;
        }

        .red {
            background-color: red;
            top: 50px;
            right: 50px;
            border-top-right-radius: 100%;
        }

        .yellow {
            background-color: yellow;
            bottom: 50px;
            left: 50px;
            border-bottom-left-radius: 100%;
        }

        .blue {
            background-color: blue;
            bottom: 50px;
            right: 50px;
            border-bottom-right-radius: 100%;
        }
    </style>
</head>

<body>
    <main>
        <div class="simon">
            <div class="black">
                <h2>Simon</h2>
                <button onclick="start()">Play</button>
            </div>
            <div class="color green" id="green" onclick="clickColor('green')"></div>
            <div class="color red" id="red" onclick="clickColor('red')"></div>
            <div class="color yellow" id="yellow" onclick="clickColor('yellow')"></div>
            <div class="color blue" id="blue" onclick="clickColor('blue')"></div>
        </div>
    </main>
    
    <script src="simon.js"></script>
</body>

</html>
