<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1066" viewBox="0 0 1600 1066" role="img" aria-labelledby="title desc">
  <title id="title">Cartell de mostra</title>
  <desc id="desc">Composicio abstracta amb cel, muntanyes i un disc solar per provar resolucions i formats web.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#10345f" />
      <stop offset="55%" stop-color="#2f7aa4" />
      <stop offset="100%" stop-color="#f0c36b" />
    </linearGradient>
    <linearGradient id="ground" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#314b3b" />
      <stop offset="100%" stop-color="#121f18" />
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0 0.08" />
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1066" fill="url(#sky)" />
  <circle cx="1180" cy="220" r="140" fill="#ffd27a" opacity="0.92" />
  <circle cx="1180" cy="220" r="205" fill="#ffd27a" opacity="0.18" />

  <path d="M0 780C180 690 270 700 420 760S720 860 880 800 1160 620 1340 680 1510 840 1600 800V1066H0Z" fill="#1d3a43" />
  <path d="M0 840C180 760 300 790 470 855S770 945 930 905 1170 760 1370 805 1490 930 1600 900V1066H0Z" fill="#284c4f" />
  <path d="M0 910C190 850 350 870 550 930S860 1020 1020 975 1270 860 1460 900 1550 980 1600 960V1066H0Z" fill="url(#ground)" />

  <g transform="translate(130 165)">
    <rect x="0" y="0" width="430" height="570" rx="30" fill="#f5ead8" opacity="0.94" />
    <rect x="28" y="28" width="374" height="514" rx="18" fill="#143040" />
    <text x="54" y="112" font-family="Georgia, serif" font-size="42" fill="#f7f0e2" letter-spacing="2">MIRADES</text>
    <text x="54" y="162" font-family="Georgia, serif" font-size="42" fill="#f7f0e2" letter-spacing="2">DE CAPVESPRE</text>
    <line x1="54" y1="188" x2="276" y2="188" stroke="#e8b75a" stroke-width="4" />
    <text x="54" y="252" font-family="Verdana, sans-serif" font-size="22" fill="#d7dde1">Projecte de rendiment web</text>
    <text x="54" y="292" font-family="Verdana, sans-serif" font-size="22" fill="#d7dde1">Formats, mida i temps de carrega</text>
    <circle cx="285" cy="360" r="88" fill="#e8b75a" />
    <path d="M114 476C168 422 207 394 246 374s74-30 132-22c-49 3-91 24-123 49s-58 58-85 98Z" fill="#f8f1df" opacity="0.9" />
  </g>

  <rect width="1600" height="1066" fill="#ffffff" opacity="0.04" filter="url(#grain)" />
</svg>
