<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankWise Dashboard</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <header class="barra-superior">
        <div class="logo">BankWise</div>
        <nav>
            <ul class="navegacion">
                <li><a class="actual" href="#">Dashboard</a></li>
                <li><a href="#">Transactions</a></li>
                <li><a href="#">Analytics</a></li>
                <li><a href="#">History</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2 class="subtitulo">Welcome back, Felix!</h2>
        <section class="tarjetas">
            <div class="tarjeta tarjeta-azul">
                <div class="chip"></div>
                <div class="numero-tarjeta">1234 5678 9</div>
                <div class="titular-tarjeta">James Clark</div>
            </div>
            <div class="tarjeta tarjeta-verde">
                <div class="chip"></div>
                <div class="tipo-tarjeta">CREDIT CARD</div>
                <div class="numero-tarjeta">1234 5678 9123 4567</div>
                <div class="titular-tarjeta">James Clark</div>
                <div class="tarjeta-inferior-vertical">
                    <div class="expiracion">Expiry Date<br>09 / 28</div>
                    <div class="logo-mc"></div>
                </div>
            </div>
            <div class="tarjeta tarjeta-balance">
                <div class="balance-cabecera">Total Balance</div>
                <div class="balance-cantidad">$87,567,890</div>
                <div class="balance-disponible">Available to spend: <b>$87,567,890</b></div>
                <div class="balance-acciones">
                    <button class="btn transferir">Transfer ↑   </button>
                    <button class="btn solicitar">Request ↓</button>
                    <button class="btn mas">...</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
