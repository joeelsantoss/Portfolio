<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercici 2</title>
    <style>
        .cuadrado-rojo, .cuadrado-azul {
            width: 100px;
            height: 100px;
            transition: transform 2s;
        }

        .cuadrado-rojo {
            background-color: red;
        }

        .cuadrado-azul {
            background-color: blue;
            transition-delay: 2s;
        }

        .cuadrado-rojo:hover {
            transform: scaleX(3);
        }

        .cuadrado-rojo:hover + .cuadrado-azul {
            transform: scaleX(3);
        }
    </style>
</head>
<body>

    <div class="cuadrado-rojo"></div>
    <div class="cuadrado-azul"></div>

</body>
</html>
