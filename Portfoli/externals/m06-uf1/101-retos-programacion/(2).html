<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anagrama</title>
</head>

<body>
    <!-- 
 * Escribe una función que reciba dos palabras (String) y retorne
 * verdadero o falso (Bool) según sean o no anagramas.
 * - Un Anagrama consiste en formar una palabra reordenando TODAS
 *   las letras de otra palabra inicial.
 * - NO hace falta comprobar que ambas palabras existan.
 * - Dos palabras exactamente iguales no son anagrama. -->

    <script>
        function main() {
            document.write(isAnagram("roma", "amor"));
        }

        function isAnagram(wordOne, wordTwo) {
            if (wordOne.toLowerCase() === wordTwo.toLowerCase()) {
                return false;
            }
            return wordOne.toLowerCase().split('').sort().join('') === wordTwo.toLowerCase().split('').sort().join('');
        }

        main();

    </script>

</body>

</html>
