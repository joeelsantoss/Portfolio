<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta 4</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 20px;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(7, 60px);
            gap: 5px;
        }
        .cell {
            width: 60px;
            height: 60px;
            border: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Conecta 4</h1>
    <main>
        <div id="board"></div>
    </main>

    <script>
        const board = document.getElementById('board');
        const rows = 6;
        const cols = 7;
        let currentPlayer = 'X';
        let gameBoard = [];

        // Inicializar el tablero
        for (let row = 0; row < rows; row++) {
            gameBoard[row] = [];
            for (let col = 0; col < cols; col++) {
                gameBoard[row][col] = '';
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.row = row;
                cell.dataset.col = col;
                cell.addEventListener('click', handleCellClick);
                board.appendChild(cell);
            }
        }

        function handleCellClick(event) {
            const col = parseInt(event.target.dataset.col);

            // Verificar si la columna no está llena
            if (gameBoard[0][col] === '') {
                // Buscar la fila vacía más baja en la columna
                let row;
                for (row = rows - 1; row >= 0; row--) {
                    if (gameBoard[row][col] === '') {
                        gameBoard[row][col] = currentPlayer;
                        updateBoard();
                        if (checkForWin(row, col)) {
                            document.write(`¡El jugador ${currentPlayer} ha ganado!`);
                            return;
                        }
                        switchPlayer();
                        break;
                    }
                }
            }
        }

        function updateBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const row = parseInt(cell.dataset.row);
                const col = parseInt(cell.dataset.col);
                cell.textContent = gameBoard[row][col];
            });
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }

        function checkForWin(row, col) {
            for (let r = 0; r < gameBoard.length; r++) {
                for (let c = 0; c < gameBoard[r].length; c++) {
                    if (gameBoard[r][c] != '') {
                        if(checkHoritzontal(r, c) || checkVertical(r, c) || checkDiagonalDalt(r, c) || checkDiagonalBaix(r, c)) {
                            return true;
                        }
                    }
                } 
            }
            return false;
        }

        function checkHoritzontal(r, c) {
            let i;
            for (i = 0; i < 4 && c + i < gameBoard[r].length; i++) {
                if (gameBoard[r][c] != gameBoard[r][c + i]) {
                    return false;
                }
            }
            return i === 4;
        }

        function checkVertical(r, c) {
            let i;
            for (i = 0; i < 4 &&  r + i < gameBoard.length; i++) {
                if (gameBoard[r][c] != gameBoard[r + i][c]) {
                    return false;
                }
            }
            
            return i === 4;
        }

        function checkDiagonalDalt(r, c) {
            let i;
            for (i = 0; i < 4 && r + i < gameBoard.length && c + i < gameBoard[r].length; i++) {
                if (gameBoard[r][c] != gameBoard[r + i][c + i]) {
                    return false;
                }
            }
            return i === 4;
        }

        function checkDiagonalBaix(r, c) {
            let i;
            for (i = 0; i < 4 && r - i >= 0 && c + i < gameBoard[r].length; i++) {
                if (gameBoard[r][c] != gameBoard[r - i][c + i]) {
                    return false;
                }
            }
            return i === 4;
        }
    </script>
</body>
</html>
