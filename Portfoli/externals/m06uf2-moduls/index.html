<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ejemplo Vite + TS</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }

    #themeBtn {
      padding: 10px 15px;
      border: none;
      cursor: pointer;
      background: #007acc;
      color: white;
      border-radius: 5px;
      font-size: 14px;
    }

    .box {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }
  </style>
</head>
<body data-theme="light">

  <h1>Primers Exercicis</h1>

  <button id="themeBtn">Cambiar Tema</button>

  <div class="box">
    <p id="Numbers"></p>
    <h3>Resultados Mathematics.ts:</h3>
    <p id="resultMin"></p>
    <p id="resultMax"></p>
    <p id="resultDecompose"></p>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
