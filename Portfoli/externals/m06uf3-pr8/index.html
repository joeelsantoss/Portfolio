<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Registro</title>
</head>
<body>
  <div class="container">
    <div class="form-box">
      <h1>Gluglu</h1>
      <h2>Crear cuenta</h2>

      <form>
        <input type="email" id="email" placeholder="usuario@gmail.com">
        <input type="password" id="password" placeholder="Contraseña">

        <div class="requirements">
          <div id="val1" class="requirement invalid">
            <span class="icon">✗</span>
            <span class="text">8 caracteres</span>
          </div>
          <div id="val2" class="requirement invalid">
            <span class="icon">✗</span>
            <span class="text">1 número</span>
          </div>
          <div id="val3" class="requirement invalid">
            <span class="icon">✗</span>
            <span class="text">1 mayúscula</span>
          </div>
          <div id="val4" class="requirement invalid">
            <span class="icon">✗</span>
            <span class="text">1 minúscula</span>
          </div>
          <div id="val5" class="requirement invalid">
            <span class="icon">✗</span>
            <span class="text">1 especial</span>
          </div>
        </div>

        <button type="submit" id="submitBtn" disabled>Siguiente</button>

        <div class="separator">o</div>

        <button type="button" class="google-btn">
          <img src="https://www.google.com/favicon.ico" alt="Google">
          Continuar con Gluglu
        </button>

        <div class="signup">
          ¿Ya tienes cuenta? <a href="#">Iniciar sesión</a>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
